services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - auth-api
      - todos-api

  auth-api:
    build: 
      context: ./auth-api
      dockerfile: Dockerfile
    container_name: auth-api
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    depends_on:
      - users-api
      - redis-queue

  users-api:
    build: 
      context: ./users-api
      dockerfile: Dockerfile
    container_name: users-api
    ports:
      - "8083:8083"
    env_file:
      - ./.env
    depends_on:
      - redis-queue

  todos-api:
    build: 
      context: ./todos-api
      dockerfile: Dockerfile
    container_name: todos-api
    ports:
      - "8082:8082"
    env_file:
      - ./.env
    depends_on:
      - redis-queue

  log-message-processor:
    build: 
      context: ./log-message-processor
      dockerfile: Dockerfile
    container_name: log-message-processor
    env_file:
      - ./.env
    depends_on:
      - redis-queue

  redis-queue:
    image: redis:alpine
    container_name: redis-queue
    ports:
      - "6379:6379"